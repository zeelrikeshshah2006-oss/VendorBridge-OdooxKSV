<!DOCTYPE html>
<html>
<head>
<title>VendorBridge - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#0f766e;
    font-size:32px;
    font-weight:bold;
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    margin:0 auto 25px;
    background:linear-gradient(135deg,#0f766e,#14b8a6);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:45px;
    box-shadow:0 5px 15px rgba(20,184,166,0.3);
}

input,
select{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    outline:none;
    transition:.3s;
    font-size:15px;
}

input:focus,
select:focus{
    border-color:#14b8a6;
    box-shadow:0 0 8px rgba(20,184,166,.25);
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#0f766e,#14b8a6);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.links{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
}

.links a{
    text-decoration:none;
    color:#0f766e;
    font-weight:500;
}

.error{
    color:red;
    margin-top:10px;
    text-align:center;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<h1>VendorBridge</h1>
</div>

<div class="avatar">👤</div>

<form action="/login" method="POST">

<input type="email" id="email" name="email"
placeholder="Email Address" required>

<input type="password" id="password" name="password"
placeholder="Password" required>

<select id="role" name="role" required>
<option value="">Select Role</option>
<option>Admin</option>
<option>Procurement Manager</option>
<option>Approver</option>
<option>Vendor</option>
</select>

{% if error %}
<div class="error" id="error" style="color:red; margin-top:10px; text-align:center;">{{ error }}</div>
{% else %}
<div class="error" id="error"></div>
{% endif %}

<button type="submit">Login</button>

</form>

<div class="links">
<a href="#">Forgot Password?</a>
<a href="/register">Register</a>
</div>

</div>

</body>
</html>
